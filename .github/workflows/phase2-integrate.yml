name: Integrate Phase 2A Inspection Database

on:
  push:
    branches:
      - inspection-database-phase-1
    paths:
      - .github/workflows/phase2-integrate.yml

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out development branch
        uses: actions/checkout@v4
        with:
          ref: inspection-database-phase-1
          fetch-depth: 0

      - name: Build and integrate inspection database
        shell: bash
        run: |
          set -euo pipefail

          base64 --decode .phase2/inspections.js.gz.b64 | gzip --decompress > inspections.js
          node --check inspections.js

          python3 - <<'PY'
          from pathlib import Path
          import re

          index_path = Path("index.html")
          index = index_path.read_text(encoding="utf-8")
          script_tag = '  <script src="./inspections.js"></script>'
          if script_tag not in index:
              needle = '  <script src="./app.js"></script>'
              if needle not in index:
                  raise SystemExit("Could not find app.js script tag in index.html")
              index = index.replace(needle, needle + "\n" + script_tag, 1)
          index_path.write_text(index, encoding="utf-8")

          worker_path = Path("service-worker.js")
          worker = worker_path.read_text(encoding="utf-8")
          worker = re.sub(
              r'const CACHE_NAME = "[^"]+";',
              'const CACHE_NAME = "mileage-logger-inspection-phase2a-v8";',
              worker,
              count=1,
          )
          if '"./inspections.js"' not in worker:
              needle = '  "./app.js",'
              if needle not in worker:
                  raise SystemExit("Could not find app.js cache entry in service-worker.js")
              worker = worker.replace(needle, needle + '\n  "./inspections.js",', 1)
          worker_path.write_text(worker, encoding="utf-8")

          notes = """# Phase 2A — Inspection Database

This development branch adds the first inspection-record system without replacing the existing mileage, GPS, STA, backup, restore, or offline features.

## Included

- Trip-linked and standalone inspection records
- Automatic copying of customer, vendor, project, date, time, mileage, GPS, and STA status from a selected trip
- Inspection dashboard and searchable history
- Multiple follow-up actions with open/closed tracking
- Direct Apple Maps links from linked trip records
- Inspection CSV export
- A post-trip prompt after the required mileage backup is confirmed
- Storage inside `settings.inspections`, which keeps inspection records inside the existing full JSON backup
- Compatibility with older backups that do not contain inspection records
- A separate inspection-backup warning when inspection changes are newer than the last confirmed full backup

## Test sequence

1. Open the app from this branch or a preview deployment.
2. Confirm the existing Start Trip, End Trip, GPS, STA, CSV, backup, and restore functions still operate.
3. Open **Inspections** from the quick actions or **Inspect** from the bottom navigation.
4. Create one standalone inspection.
5. Create one inspection linked to a completed mileage trip.
6. Add two follow-ups, close one from the Open Follow-ups view, and edit the inspection.
7. Export the inspection CSV.
8. Save a full JSON backup, restore it, and verify the inspection records and follow-ups return.
9. Confirm an older mileage-only backup restores with an empty inspection database and no error.

Do not merge into `main` until this sequence has been completed on the intended iPhone/iPad and desktop browsers.
"""
          Path("PHASE_2A_TESTING.md").write_text(notes, encoding="utf-8")
          PY

          rm -rf .phase2
          rm -f .github/workflows/phase2-integrate.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add Phase 2A inspection records and follow-up tracking"
          git push origin HEAD:inspection-database-phase-1
